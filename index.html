<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0} html{-webkit-text-size-adjust:100%}
body{background:#EEF3FA;color:#13233F;font-family:'Be Vietnam Pro',system-ui,sans-serif}
button,input{font-family:inherit} button{cursor:pointer}
header{background:radial-gradient(1100px 380px at 85% -60%,#1c5cb8 0%,transparent 55%),linear-gradient(150deg,#071F45 0%,#0B2E63 100%);color:#fff;padding:20px 14px 0;padding-top:calc(20px + env(safe-area-inset-top))}
.hwrap,main{max-width:860px;margin:0 auto}
.hbadges{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tag{background:#FFD500;color:#071F45;font-weight:900;font-size:11px;padding:3px 9px;border-radius:5px}
.hsub{font-size:10.5px;opacity:.8;font-weight:700;letter-spacing:2px}
h1{font-size:22px;font-weight:900;margin-top:8px;text-shadow:0 2px 10px rgba(0,0,0,.25)}
.hsub2{font-size:12px;opacity:.75;font-weight:600;margin-top:2px}
nav{display:flex;gap:5px;margin-top:16px;overflow-x:auto}
.tabb{padding:10px 15px;border:none;font-weight:800;font-size:13px;white-space:nowrap;border-radius:12px 12px 0 0;background:rgba(255,255,255,.08);color:#fff}
.tabb.on{background:#EEF3FA;color:#0B2E63}
main{padding:16px 12px 44px}
.card{background:#fff;border-radius:18px;box-shadow:0 2px 10px rgba(7,31,69,.07)}
.card.p{padding:18px;border-top:4px solid #FFD500;margin-bottom:14px}
.hint{font-size:13px;color:#5B6B85;margin-top:4px}
.srow{display:flex;gap:8px;margin-top:14px}
.srow input,.chat-i input{flex:1;padding:12px 14px;border-radius:13px;border:1.5px solid #5B6B8540;font-size:16px;min-width:0}
.btn-y{background:linear-gradient(135deg,#FFD500,#ffdf3d);color:#071F45;font-weight:900;border:none;border-radius:13px;padding:0 22px;font-size:14px;box-shadow:0 3px 10px rgba(255,213,0,.35)}
.err{color:#E23A3A;font-size:12.5px;margin-top:8px;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:#5B6B85}
.chip{background:#fff;border:1.5px solid #1257B826;border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:600;color:#1257B8}
.seg{padding:9px 15px;border-radius:999px;border:none;font-weight:800;font-size:13px;background:#EEF3FA;color:#13233F}
.seg.on{background:#0B2E63;color:#fff}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:9px;margin-top:15px}
.stat{background:linear-gradient(160deg,#EEF3FA,#fff);border:1px solid #5B6B8518;border-radius:13px;padding:11px 10px;text-align:center}
.stat-v{font-size:19px;font-weight:900;color:#0B2E63}
.stat-v small{font-size:10.5px;color:#5B6B85;font-weight:700}
.stat-l{font-size:10px;color:#5B6B85;font-weight:700;margin-top:3px}
.stat-d{background:linear-gradient(135deg,#0B2E63,#164a94);border:none}
.stat-d .stat-v{color:#fff}.stat-d .stat-v small{color:#FFD500}.stat-d .stat-l{color:#ffffffcc}
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;background:linear-gradient(135deg,#1257B8,#0B2E63);flex:none}
.av-y{color:#071F45;background:linear-gradient(135deg,#FFD500,#ffe566)}
.prow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pinfo{flex:1;min-width:150px} .pinfo h2{font-size:19px;font-weight:900}
.sub{font-size:12px;color:#5B6B85;font-weight:600;margin-top:2px} .sub2{font-size:11px;color:#5B6B85}
.badge-y{background:linear-gradient(135deg,#FFD500,#ffe566);color:#071F45;font-weight:900;padding:9px 16px;border-radius:13px;font-size:14px;box-shadow:0 3px 10px rgba(255,213,0,.4)}
.badge-g{background:#EEF3FA;color:#5B6B85;font-weight:700;padding:9px 14px;border-radius:13px;font-size:13px}
.badge-n{background:linear-gradient(135deg,#0B2E63,#164a94);color:#fff;font-weight:900;padding:9px 16px;border-radius:13px;font-size:14px}
.note-y{margin-top:12px;background:#FFF6E0;border:1.5px solid #FFD500;border-radius:13px;padding:11px 14px;font-size:13px;line-height:1.55}
.note-g{margin-top:12px;background:#F0FBF4;border:1.5px solid #00B05055;border-radius:13px;padding:11px 14px;font-size:13px}
.mgwrap{overflow-x:auto;margin-top:12px}
.mg{border-collapse:separate;border-spacing:2.5px;font-size:12px;width:100%}
.mg th{color:#5B6B85;font-weight:800;font-size:10.5px}
.c-name{font-weight:700;font-size:11.5px;max-width:118px;padding:3px 4px}
.mg td{text-align:center;border-radius:7px;padding:6px 4px;font-weight:900;font-size:12px}
.c-p{background:rgba(0,176,80,.13);color:#00B050}.c-f{background:rgba(226,58,58,.1);color:#E23A3A}.c-n{color:#5B6B85}
.c-sum{font-weight:900}.c-sum.ok{color:#00B050}
.legend{font-size:10.5px;color:#5B6B85;margin-top:5px}
.mini-title{font-size:11px;color:#5B6B85;font-weight:800;letter-spacing:.4px;margin-top:13px}
.trend svg{margin-top:4px}
.stitle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:900;color:#0B2E63;letter-spacing:.6px;margin:6px 0 9px}
.stitle:before{content:"";width:5px;height:16px;background:#FFD500;border-radius:3px;display:inline-block}
.list{margin-top:10px}
.rowi{display:flex;width:100%;text-align:left;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;border:none;background:#fff;font-size:13.5px}
.rowi.alt{background:#EEF3FA}
.rk{width:30px;font-weight:900;font-size:13px;text-align:center;color:#5B6B85}.rk.gold{color:#B8860B}
.nm{flex:1;font-weight:700}.nm small{color:#5B6B85;font-weight:400;font-size:11px}
.pt{font-weight:900;font-size:14px;color:#0B2E63}
.tnbox{margin-top:11px;background:#EEF3FA;border-radius:13px;padding:10px 13px;font-size:13px;display:flex;align-items:center;gap:10px}
.tb{border-collapse:collapse;font-size:12px;width:100%;min-width:520px}
.tb th{padding:6px 8px;border-bottom:2px solid #EEF3FA;color:#5B6B85;font-size:10px;text-align:left;font-weight:800}
.tb td{padding:8px}.tb tr.alt{background:#EEF3FA}
.rules{white-space:pre-wrap;font-size:13px;line-height:1.7;font-family:inherit;margin-top:8px}
.act{margin-top:11px;background:#EEF3FA;border-radius:14px;padding:12px 14px}
.act-t{font-weight:900;font-size:13.5px;color:#0B2E63}
.act-m{font-size:12px;color:#B8860B;font-weight:700;margin-top:4px;font-style:italic}
.act-i{font-size:12.5px;margin-top:6px;line-height:1.55}
.chat{overflow:hidden;margin-bottom:14px}
.chat-h{background:linear-gradient(90deg,#0B2E63,#164a94);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;font-weight:900;font-size:13px;letter-spacing:.6px}
.dot{width:8px;height:8px;border-radius:4px;background:#FFD500;box-shadow:0 0 8px #FFD500}
.ai-link{margin-left:auto;background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:4px 11px;font-size:11.5px;font-weight:800;text-decoration:none}
.chat-b{padding:14px;min-height:130px;max-height:400px;overflow-y:auto}
.brow{display:flex;margin-bottom:10px}.brow.user{justify-content:flex-end}
.bub{max-width:85%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.55}
.bub.user{background:#1257B8;color:#fff;border-bottom-right-radius:3px}
.bub.assistant{background:#EEF3FA;border-bottom-left-radius:3px}
.chat-i{display:flex;gap:8px;padding:12px;border-top:1px solid #5B6B8522}
.back{background:none;border:none;color:#1257B8;font-weight:800;font-size:14px;padding:4px 4px 12px}

.mm{border-collapse:separate;border-spacing:4px;width:100%;min-width:430px}
.mm th{color:#5B6B85;font-weight:800;font-size:11px;padding:2px}
.mm-h-tinh{text-align:left!important;min-width:78px}
.mm-tinh{font-size:12px;font-weight:700;line-height:1.2;padding:4px 6px;white-space:nowrap}
.mm-tinh small{color:#5B6B85;font-weight:600;font-size:10px}
.mm-cell{background:#EEF3FA;border-radius:9px;padding:6px 3px;text-align:center;vertical-align:middle}
.dots{display:flex;gap:2.5px;justify-content:center}
.dot-x{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-p{background:#00B050}.dot-f{background:#E23A3A}.dot-none{background:#c9d3e0}
.mm-n{font-size:9.5px;font-weight:800;color:#5B6B85;display:block;margin-top:3px}
.mm-legend{font-size:11px;color:#5B6B85;line-height:1.6;margin:2px 0 10px}
.mm-legend .dot-x{vertical-align:middle;margin:0 1px}
.dtwrap{overflow-x:auto;margin-top:12px;border:1px solid #5B6B8522;border-radius:12px}
.dt{border-collapse:collapse;font-size:11px;white-space:nowrap}
.dt th,.dt td{padding:5px 7px;text-align:center;border-bottom:1px solid #EEF3FA}
.dt thead th{background:#0B2E63;color:#fff;font-weight:800;font-size:10px}
.dt thead tr.mh th{background:#071F45}
.dt .c-rk{font-weight:900;color:#0B2E63}
.dt .c-nm{text-align:left;font-weight:700;color:#13233F}
.dt .c-nm small{color:#5B6B85;font-weight:600}
.dt td.mstart,.dt th.mstart{border-left:2px solid #0B2E6326}
.dt tbody tr:nth-child(even) td{background:#F5F8FC}
.dt .dt-tc{color:#1257B8;font-weight:800}
.dt .dt-kn{color:#E23A3A;font-weight:800}
.dt .dt-xl{color:#B8860B;font-weight:800}
.dt .dt-dt{color:#00844b;font-weight:800}
.dt .muted{color:#c1cad8}
.dt tr.khsep td{background:#EEF3FA!important;text-align:left;font-weight:900;color:#0B2E63;font-size:11px}
.dt.dtv td,.dt.dtv th{text-align:center}
.dt.dtv .c-cri{text-align:left;font-weight:800;color:#13233F;white-space:nowrap;position:sticky;left:0;background:#F4F7FC;z-index:1}
.dt .dt-bd{color:#7A3EA1;font-weight:800}
.mm .mm-tong td{background:#FFF6E0!important;border-top:2px solid #FFD500;border-bottom:2px solid #FFD500}
.mm .mm-tong .mm-tinh b{color:#B8860B}
/* Sticky cột đầu khi kéo ngang (yc anh Thu 22/07) */
.mm th.mm-h-tinh{position:sticky;left:0;background:#fff;z-index:3}
.mm td.mm-tinh{position:sticky;left:0;background:#fff;z-index:2}
.dt td.c-rk{position:sticky;left:0;background:#fff;z-index:2;width:30px;min-width:30px;max-width:30px;box-sizing:content-box}
.dt:not(.dtv) td.c-nm{position:sticky;left:44px;background:#fff;z-index:2}
.dt tr.mh th:nth-child(1){position:sticky;left:0;z-index:4}
.dt:not(.dtv) tr.mh th:nth-child(2){position:sticky;left:44px;z-index:4}
.dt tr.khsep td:first-child{position:sticky;left:0}
.mg td.c-name,.mg thead th:first-child{position:sticky;left:0;background:#fff;z-index:2;text-align:left}
.dt .c-tot{background:#FFF6E0!important;font-weight:800;border-bottom:1px solid #FFD50055}
.dt thead .c-tot{background:#8a6d00!important;color:#fff}
.mm .vcell{cursor:pointer}
.mm .vcell b{font-size:13px;color:#0B2E63}
.mm .vcell.von{outline:2px solid #FFD500;outline-offset:-2px}
.mm td.c-tot{background:#FFF6E0}
.mm th.c-tot{color:#8a6d00}
.mm .exprow td{background:#fff!important;padding:8px 6px;border:1px solid #FFD50066;border-radius:10px}
.vdet{border-collapse:collapse;font-size:11.5px;width:100%;min-width:460px}
.vdet th{color:#5B6B85;font-size:10px;padding:4px 6px;border-bottom:2px solid #EEF3FA;text-align:center}
.vdet td{padding:5px 6px;border-bottom:1px solid #EEF3FA;text-align:center}
.vdet td:first-child{text-align:left;font-weight:700;white-space:nowrap}
.vdet .ok{color:#00B050;font-weight:800}.vdet .no{color:#E23A3A;font-weight:800}.vdet .muted{color:#c1cad8}
</style>

    "📈 Giao chỉ tiêu doanh thu Sửa Chữa Board và Thay Linh Kiện theo ngày/tuần cho từng thợ, theo dõi công khai.",
    "💬 Tư vấn thêm dịch vụ sửa chữa khi bảo hành tại nhà hoặc đi bảo dưỡng.",
    "🤲 Trung thực trong sửa chữa: không hủy đơn, không thu tiền ngoài — có đội CSKH chăm sóc ngay sau sửa chữa.",
    "🎓 Học thêm nghiệp vụ tư vấn sửa chữa / thay linh kiện."]},
};

const C = { navy:"#0B2E63", navyDeep:"#071F45", blue:"#1257B8", yellow:"#FFD500", gold:"#B8860B", bg:"#EEF3FA", pass:"#00B050", fail:"#E23A3A", text:"#13233F", sub:"#5B6B85" };
const norm = (s)=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/đ/g,"d");
const TINH_LIST = [...new Set(NV.map(n=>n.tinh))].filter(Boolean);
const nvOfKho = (kho)=>NV.filter(n=>n.kho===kho).sort((a,b)=>(a.xepHang??99)-(b.xepHang??99));
const vtThreshold = (kho)=>{ const v=nvOfKho(kho).filter(n=>n.vuotTroi).map(n=>n.diem); return v.length? Math.min(...v):null; };
const monthsPass = (p,ck)=>MONTHS.filter(m=>p.thang&&p.thang[m]&&p.thang[m].tc&&p.thang[m].tc[ck]&&p.thang[m].tc[ck].d>0);
const medal = (h)=> h===1?"🥇":h===2?"🥈":h===3?"🥉":null;
function localAnswer(qRaw, user) {
  const q = norm(qRaw);
  const d = user.data;
  const has = (...ws)=>ws.some(w=>q.includes(w));
  const hasW = (...ws)=>ws.some(w=>new RegExp("(^|[^a-z0-9])"+w.replace(/ /g,"\\s+")+"($|[^a-z0-9])").test(q));
  const critQ = ()=>{
    if (has("khieu nai","gop y","than phien")) return "khieuNai";
    if (has("tiep can")) return "tiepCan";
    if (has("dut diem","xldd","xu ly dd","1 lan")) return "xldd";
    if (has("5 sao","nam sao","phuc vu")) return "5sao";
    if (has("dung hen","tre hen")) return "dungHen";
    if (has("tay nghe","imei","lap lai")) return "tayNghe";
    if (has("khach le","scdv")) return "scdv";
    return null;
  };
  const tenTC = (k)=> (CRIT_NV[k]||CRIT_TN[k]||k);
  const actionText = (k)=>{ const a=ACTIONS[k]; if(!a) return "";
    return `${a.icon} ${a.ten}\n💡 ${a.moto}\n` + a.items.map(x=>"  "+x).join("\n"); };
  const failMonths = (p,k)=> MONTHS.filter(m=>p.thang?.[m] && !(p.thang[m].tc?.[k]?.d>0));
  const mMatch = q.match(/(?:^|[^a-z0-9])(?:thang\s*|t)([1-9])(?:$|[^0-9])/);
  const multiMonth = [...q.matchAll(/(?:^|[^a-z0-9])(?:thang\s*|t)([1-9])(?![0-9])/g)].length>=2; // 2 tháng → để lớp so sánh xử lý
  const askMonth = mMatch? "T"+mMatch[1] : null;
  const kCrit = critQ();
  // PHẠM VI so sánh: kho (mặc định) / vùng VTB-VDH / toàn khu vực
  const vungQ = (has("trung bo")||hasW("vtb"))? "VTB" : ((has("duyen hai")||hasW("vdh"))? "VDH" : null);
  const toanVung = has("toan vung","toan khu vuc","ca khu vuc","2 vung","hai vung","tat ca");
  const rankOf = (val, arr)=> arr.filter(x=>x>val).length + 1;
  const tinhInQ = TINH_LIST.filter(t=>q.includes(norm(t)));

  // ========== KHIẾU NẠI CHI TIẾT (quét 7 file Than phiền T1–T7) ==========
  if (has("khieu nai","than phien","phan anh","bi che","phan nan","gop y") && !has("cai thien","lam gi","cach","hanh dong","giai phap","cai th")) {
    const mQ = (qRaw.match(/(\d{4,6})/)||[])[1];
    const nmOf = (ma)=> (NV.find(n=>n.ma===ma)||TN.find(t=>t.ma===ma)||{}).ten || (ma===d.ma? d.ten : "");
    const knOf = (ma)=>{ let l=(KN[ma]||[]).slice(); const who = ma===d.ma? "anh/chị" : ("NV "+ma+(nmOf(ma)?" "+nmOf(ma):""));
      const scope = askMonth? " "+askMonth : " (T1–T7)";
      if (askMonth) l=l.filter(x=>x.t===askMonth);
      if (!l.length) return `Dạ, ${who} KHÔNG có khiếu nại nào${scope} 👍 — quá tốt ạ!`;
      return `Dạ, ${who} có ${l.length} khiếu nại${scope}:\n` + l.map(x=>`• ${x.t} · ${x.l} · kho ${x.k.split("_")[1]||x.k} · ${x.d}\n   "${x.nd}…"`).join("\n"); };
    const knKho = (tinh, kho)=>{ const mem=NV.filter(n=>(tinh? n.tinh===tinh : n.kho===kho) && KN[n.ma] && KN[n.ma].length);
      const nm = tinh || (NV.find(n=>n.kho===kho)||{}).tinh || kho;
      return mem.length? `Dạ, kho ${nm} có ${mem.length} NV bị khiếu nại (T1–T7):\n`+mem.sort((a,b)=>KN[b.ma].length-KN[a.ma].length).map(n=>`• ${n.ten} (${n.ma}): ${KN[n.ma].length} phiếu`).join("\n")+`\nGõ mã NV để xem chi tiết từng phiếu ạ.` : `Dạ, kho ${nm} không có NV nào bị khiếu nại T1–T7 ạ 👍.`; };
    if (mQ) return knOf(mQ);
    if (user.type==="nv") return knOf(d.ma);
    if (user.type==="tn") { const self=has("cua toi","cua em","cua minh","toi bi","em bi","rieng toi"); return self? knOf(d.ma) : knKho(null,d.kho); }
    if (user.type==="kho") return knKho(null,d.kho);
    if (user.type==="ql") { if (tinhInQ.length) return knKho(tinhInQ[0],null);
      const tot=Object.values(KN).reduce((s,l)=>s+l.length,0);
      return `Dạ, anh gõ kèm MÃ NV (vd "khiếu nại 71035") hoặc tên tỉnh (vd "khiếu nại Huế") để em liệt kê chi tiết ạ. Toàn khu vực: ${Object.keys(KN).length} người bị khiếu nại, tổng ${tot} phiếu (T1–T7).`; }
  }

  // ========== A. CHUNG (mọi vai trò) ==========
  if (has("thu nhap","luong","tien luong"))
    return "Dạ, dữ liệu thu nhập KHÔNG có trong app này ạ. Tiêu chí 'thu nhập cao' chỉ dùng để xét khi bằng điểm số. Anh/chị vui lòng liên hệ trưởng nhóm hoặc anh Thu ("+MANAGER.ma+") nhé.";
  if (has("hoi duoc gi","cau hoi nao","hoi gi","huong dan","help","dung the nao","su dung")) {
    const list = user.type==="nv"? ["Em đứng thứ mấy trong kho / so với vùng / toàn khu vực?","Em được bao nhiêu điểm? Đạt Vượt Trội chưa?","Tháng nào em không đạt? · Tháng 4 tiêu chí nào không đạt?","Tiêu chí tiếp cận tháng nào không đạt?","Em cần bao nhiêu điểm để đạt Vượt Trội?","Làm sao cải thiện 5 sao / tiếp cận / XLDĐ?","Ai đứng đầu kho em? Kho em mấy người Vượt Trội?","Tiêu chí xét Vượt Trội là gì?"]
      : user.type==="tn"? ["Kho tôi hạng mấy trong vùng / so với cả 13 TN?","Tiêu chí nào tôi không đạt, tháng mấy? · Tháng 3 thế nào?","Cần bao nhiêu điểm để lên hạng 1?","Kho tôi mấy người Vượt Trội? Ai đứng đầu / ai yếu nhất đội?","Hành động cải thiện đúng hẹn / 5 sao...?"]
      : user.type==="ql"? ["Cho anh kết quả tổng khu vực","Kho nào yếu nhất / mạnh nhất / nhiều VT nhất?","Danh sách ai đạt Vượt Trội?","So sánh Đà Nẵng với Huế","Kho Quảng Ngãi thế nào?","Ai dẫn đầu TN/NV mỗi vùng?"]
      : ["Ai đứng đầu kho này? Top 3?","Bao nhiêu người đạt Vượt Trội, là ai?","Kho này hạng mấy? Trưởng nhóm là ai?","Ai điểm thấp cần hỗ trợ?"];
    return "Dạ, em trả lời tức thì được các câu sau ⚡ (câu khác em sẽ hỏi AI):\n" + list.map(x=>"• "+x).join("\n");
  }
  if (hasW("chao","hello","hi") && q.length < 20)
    return "Dạ em chào anh/chị! 👋 Gõ 'hỏi được gì' để xem danh sách câu em trả lời tức thì nhé!";
  if (has("tieu chi") && has("xet","la gi","gom") && !has("khong dat","chua dat","thang") && !askMonth && !kCrit)
    return `Dạ, tiêu chí xét Vượt Trội 6 tháng đầu năm:\n◆ NV tại nhà (2đ/tiêu chí/tháng): 😊 Không góp ý/khiếu nại · 📲 Tiếp cận ≥ TB kho · 🎯 Không lỗi XLDĐ 1 lần. Bằng điểm xét thu nhập cao. Quota 30%/kho.\n◆ TN tại nhà: ⭐ 5 Sao (4đ) · ⏰ Đúng hẹn (2đ) · 🔧 Tay nghề (2đ) · 🎯 XLDĐ (2đ) · 💰 SCDV (2đ). Xếp hạng riêng VTB/VDH.\n◆ Điều kiện chung: tối thiểu 5 tháng ở vị trí. Có điểm = tháng đạt; 0đ = không đạt/không đi làm.`;

  // ========== B. THEO THÁNG CỤ THỂ ==========
  if (askMonth && !multiMonth && (user.type==="nv" || user.type==="tn")) {
    if (askMonth === "T7"){ const x7 = extraAnswer(q, user); if (x7) return x7;
      return "Dạ, số Tháng 7 đang TẠM TÍNH giữa tháng. Anh/chị hỏi: \"tháng 7 thế nào\" (TN/QL), \"tiếp cận tháng 7\" hoặc \"doanh thu tháng 7\" (NV) để xem số tạm; số chốt cập nhật đầu Tháng 8 ạ."; }
    const mm = d.thang?.[askMonth];
    if (!mm) return `Dạ, ${askMonth} anh/chị chưa có dữ liệu trong app ạ.`;
    if (kCrit) { // tháng X + tiêu chí Y
      if (user.type==="tn" && TN_FROM_T7.includes(kCrit)) return `Dạ, ${tenTC(kCrit)} áp dụng từ T7 nên ${askMonth} chưa tính ạ.`;
      const tc = mm.tc?.[kCrit];
      return tc?.d>0? `Dạ, ${askMonth} tiêu chí ${tenTC(kCrit)} anh/chị ĐẠT ✅ (${tc.d}đ${tc.kq!=null? `, KQ ${tc.kq}${tc.kpi!=null?"/KPI "+tc.kpi:""}`:""}).`
        : `Dạ, ${askMonth} tiêu chí ${tenTC(kCrit)} CHƯA ĐẠT ❌${tc&&tc.kq!=null? ` (KQ ${tc.kq}${tc.kpi!=null?"/KPI "+tc.kpi:""})`:""}.\n\n${actionText(kCrit)}`;
    }
    const keys = user.type==="nv"? Object.keys(CRIT_NV): Object.keys(CRIT_TN).filter(k=>!TN_FROM_T7.includes(k));
    const passL=[], failL=[];
    keys.forEach(k=>{ const tc=mm.tc?.[k];
      const line=`${ACTIONS[k]?.icon} ${tenTC(k)}${tc&&tc.kq!=null? ` (KQ ${tc.kq}${tc.kpi!=null?"/KPI "+tc.kpi:""})`:""}`;
      (tc?.d>0? passL: failL).push(line); });
    const diemM = mm.diem ?? mm.tong ?? 0;
    let out = `Dạ, kết quả ${askMonth} của anh/chị (${diemM} điểm):\n`;
    if (failL.length) out += `❌ CHƯA ĐẠT:\n${failL.map(x=>"  "+x).join("\n")}\n`;
    if (passL.length) out += `✅ Đạt:\n${passL.map(x=>"  "+x).join("\n")}`;
    if (!failL.length) out += `\n🎉 ${askMonth} đạt trọn vẹn, quá tốt ạ!`;
    else if (diemM===0) out += `\n(0 điểm cả tháng — nếu tháng đó không đi làm thì là bình thường ạ.)`;
    return out;
  }

  // ========== C. NHÂN VIÊN ==========
  if (user.type === "nv") {
    const members = nvOfKho(d.kho);
    const thr = vtThreshold(d.kho);
    const gap = (!d.vuotTroi && thr!=null)? Math.max(0, thr-d.diem): 0;
    const nM = Object.keys(d.thang||{}).length;
    const weak = Object.keys(CRIT_NV).sort((a,b)=>(d.diemLK?.[a]??0)-(d.diemLK?.[b]??0))[0];

    // C1. Tiêu chí cụ thể + tháng nào fail
    if (kCrit && has("thang nao","thang may","chua dat","khong dat","dat may")) {
      const f = failMonths(d,kCrit);
      return f.length? `Dạ, tiêu chí ${tenTC(kCrit)}: anh/chị CHƯA ĐẠT các tháng ${f.join(", ")} (đạt ${nM-f.length}/${nM}).\n\n${actionText(kCrit)}`
        : `Dạ, tiêu chí ${tenTC(kCrit)} anh/chị đạt đủ ${nM}/${nM} tháng ✅!`;
    }
    // C2. Tổng hợp tháng
    if (has("thang nao","thang may") || (has("chua dat","khong dat") && !hasW("hang"))) {
      const lines = Object.keys(CRIT_NV).map(kk=>{ const f=failMonths(d,kk);
        return `• ${ACTIONS[kk]?.icon} ${tenTC(kk)}: ${f.length? "chưa đạt "+f.join(", "): "đạt đủ ✅"}`; });
      return `Dạ, tổng hợp ${nM} tháng của anh/chị:\n${lines.join("\n")}\n\nHỏi kèm tháng cụ thể (vd "tháng 4") để xem chi tiết!`;
    }
    // C3. Xếp hạng — theo PHẠM VI
    if (hasW("hang","xep hang","thu may","dung thu","thu hang","hang may","thu bao nhieu","xep thu")) {
      if (toanVung || (vungQ && vungQ!==d.vung) || vungQ || has("khu vuc","so voi vung")) {
        const scope = toanVung? null : (vungQ || d.vung);
        const pool = scope? NV.filter(n=>n.vung===scope): NV;
        const scopeName = scope? (scope==="VTB"?"Vùng Trung Bộ":"Vùng Duyên Hải"): "toàn khu vực (2 vùng)";
        if (scope && scope!==d.vung) return `Dạ, anh/chị thuộc ${d.vung==="VTB"?"Vùng Trung Bộ":"Vùng Duyên Hải"} nên không xếp hạng trong ${scopeName} ạ. Trong vùng của mình, anh/chị đang hạng ${rankOf(d.diem, NV.filter(n=>n.vung===d.vung).map(n=>n.diem))}/${NV.filter(n=>n.vung===d.vung).length} với ${d.diem}đ.`;
        const r = rankOf(d.diem, pool.map(n=>n.diem));
        const top = [...pool].sort((a,b)=>b.diem-a.diem)[0];
        return `Dạ, trong ${scopeName} (${pool.length} nhân viên), anh/chị xếp hạng ${r} với ${d.diem} điểm. Đứng đầu: ${top.ten} (${top.tinh}, ${top.diem}đ).\n📌 Lưu ý: Vượt Trội xét chính thức THEO KHO (quota 30%/kho) — hạng trong kho ${d.tinh} của anh/chị là ${d.xepHang}/${members.length}; hạng vùng chỉ để tham khảo ạ.`;
      }
      const top = members[0];
      return `Dạ, anh/chị đang xếp hạng ${d.xepHang}/${members.length} trong kho ${d.tinh} với ${d.diem} điểm lũy kế${d.vuotTroi? " — và đã ĐẠT VƯỢT TRỘI 🏆!":"."}\nĐứng đầu kho là ${top.ten} (${top.diem}đ)${top.vuotTroi?" 🏆":""}.`;
    }
    // C4. Đạt VT chưa / khoảng cách VT (trừ câu đếm NGƯỜI)
    if (has("vuot troi","dat vt") && !has("nguoi","nhung ai","ai dat")) {
      if (has("chua","dat khong","co dat","du chua") && !has("can","bao nhieu","lam gi"))
        return d.vuotTroi? `Dạ, anh/chị ĐÃ ĐẠT VƯỢT TRỘI 🏆 (${d.diem}đ, hạng ${d.xepHang}/${members.length} kho ${d.tinh}). Chúc mừng ạ!`
          : `Dạ, anh/chị CHƯA đạt Vượt Trội — đang ${d.diem}đ, hạng ${d.xepHang}/${members.length} kho ${d.tinh}, cần thêm ${gap}đ để chạm mốc thấp nhất (${thr??"—"}đ).`;
      if (d.vuotTroi) return `Dạ, anh/chị ĐÃ ĐẠT VƯỢT TRỘI 🏆 với ${d.diem}đ. Để giữ vững: duy trì đủ 3 tiêu chí mỗi tháng, chú ý ${tenTC(weak)} đang yếu nhất.\n\n${actionText(weak)}`;
      return `Dạ, anh/chị đang có ${d.diem}đ — cần thêm ${gap}đ để chạm mốc Vượt Trội thấp nhất của kho ${d.tinh} (${thr??"—"}đ). Mỗi tháng đạt đủ 3 tiêu chí = 6đ, tập trung từ tháng này là kịp ạ!\nTiêu chí yếu nhất: ${tenTC(weak)}.\n\n${actionText(weak)}`;
    }
    if (has("can lam gi","can gi","lam the nao de dat"))
      return `Dạ, để đạt Vượt Trội anh/chị cần thêm ${gap}đ (hiện ${d.diem}đ, mốc kho ${d.tinh} là ${thr??"—"}đ). Tập trung tiêu chí yếu nhất: ${tenTC(weak)}.\n\n${actionText(weak)}`;
    // C5. Hành động theo tiêu chí
    if (kCrit && has("lam gi","cai thien","hanh dong","giai phap","cach","lam sao"))
      return `Dạ, cách cải thiện ${tenTC(kCrit)}:\n\n${actionText(kCrit)}`;
    // C6. Điểm của mình
    if (has("bao nhieu diem","may diem","diem cua","duoc bao nhieu"))
      return `Dạ, anh/chị đang có ${d.diem} điểm lũy kế (${Object.entries(CRIT_NV).map(([k,n])=>`${ACTIONS[k]?.icon} ${d.diemLK?.[k]??0}đ`).join(" · ")}), hạng ${d.xepHang}/${members.length} kho ${d.tinh}${d.vuotTroi?" — ĐẠT VƯỢT TRỘI 🏆":""}.`;
    // C7. Kho của mình
    if (has("dung dau","cao nhat","gioi nhat")) { const top=members[0];
      return `Dạ, đứng đầu kho ${d.tinh} là ${top.ten} với ${top.diem}đ${top.vuotTroi?" 🏆":""}. Top 3: ${members.slice(0,3).map((n,i)=>`${medal(i+1)} ${n.ten} (${n.diem}đ)`).join(" · ")}`; }
    if (has("may nguoi","bao nhieu nguoi"))
      return `Dạ, kho ${d.tinh} có ${members.filter(n=>n.vuotTroi).length}/${members.length} người đạt Vượt Trội 🏆: ${members.filter(n=>n.vuotTroi).map(n=>n.ten).join(", ")||"(chưa có)"}.`;
  }

  // ========== D. TRƯỞNG NHÓM ==========
  if (user.type === "tn") {
    const sameVung = TN.filter(t=>t.vung===d.vung).sort((a,b)=>(a.xepHang??99)-(b.xepHang??99));
    const top = sameVung[0];
    const gap = top.ma!==d.ma? top.tongDiem-d.tongDiem: 0;
    const members = nvOfKho(d.kho);
    if (kCrit && has("thang nao","thang may","chua dat","khong dat")) {
      if (TN_FROM_T7.includes(kCrit)) return `Dạ, tiêu chí ${tenTC(kCrit)} áp dụng từ THÁNG 7, T1-T6 chưa tính ạ (4đ/tháng từ T7).`;
      const f = failMonths(d,kCrit);
      return f.length? `Dạ, ${tenTC(kCrit)}: kho anh/chị CHƯA ĐẠT các tháng ${f.join(", ")} (đạt ${6-f.length}/6).\n\n${actionText(kCrit)}`
        : `Dạ, ${tenTC(kCrit)} đạt đủ 6/6 tháng ✅!`;
    }
    if (has("thang nao","thang may") || (has("chua dat","khong dat") && !hasW("hang"))) {
      const lines = Object.keys(CRIT_TN).map(kk=>{ if (TN_FROM_T7.includes(kk)) return `• ${ACTIONS[kk]?.icon} ${tenTC(kk)}: áp dụng từ T7`;
        const f=failMonths(d,kk); return `• ${ACTIONS[kk]?.icon} ${tenTC(kk)}: ${f.length? "chưa đạt "+f.join(", "): "đạt đủ ✅"}`; });
      return `Dạ, tổng hợp 6 tháng kho ${d.tinh}:\n${lines.join("\n")}\n\nHỏi tháng cụ thể (vd "tháng 3") để xem KQ/KPI chi tiết ạ!`;
    }
    if (hasW("hang 1","len hang","dan dau") || has("bao nhieu diem"))
      return gap>0? `Dạ, anh/chị cần thêm ${gap}đ để bắt kịp ${top.ten} (${top.tongDiem}đ) — hạng 1 ${d.vung}. Từ T7 bộ KPI mới nâng SCDV lên 4đ/tháng — cơ hội bứt phá đó ạ!`
        : `Dạ, anh/chị đang hạng 1 ${d.vung} 🥇 — giữ vững phong độ nhé!`;
    if (hasW("hang","xep hang","thu may","dung thu","hang may","xep thu")) {
      if (toanVung || has("13","ca hai vung","2 vung","tat ca")) {
        const r = rankOf(d.tongDiem, TN.map(t=>t.tongDiem));
        const bestAll = [...TN].sort((a,b)=>b.tongDiem-a.tongDiem)[0];
        return `Dạ, so cả 13 trưởng nhóm 2 vùng: anh/chị hạng ${r}/13 với ${d.tongDiem}đ. Dẫn đầu chung: ${bestAll.ten} (${bestAll.tinh}, ${bestAll.tongDiem}đ).\n📌 Xếp hạng chính thức tính riêng từng vùng — trong ${d.vung}, anh/chị hạng ${d.xepHang}/${sameVung.length}.`;
      }
      return `Dạ, kho ${d.tinh} đang hạng ${d.xepHang}/${sameVung.length} ${d.vung==="VTB"?"Vùng Trung Bộ":"Vùng Duyên Hải"} với ${d.tongDiem}đ ${medal(d.xepHang)??""}.\n${gap>0? `Đứng đầu: ${top.ten} (${top.tongDiem}đ) — cách ${gap}đ.`: "Anh/chị đang DẪN ĐẦU 🥇!"}`;
    }
    if (has("vuot troi","may nguoi","bao nhieu nguoi"))
      return `Dạ, kho ${d.tinh} có ${members.filter(n=>n.vuotTroi).length}/${members.length} NV đạt Vượt Trội 🏆:\n${members.filter(n=>n.vuotTroi).map(n=>`• ${n.ten} — ${n.diem}đ (hạng ${n.xepHang})`).join("\n")||"(chưa có)"}`;
    if (has("dung dau","gioi nhat","cao nhat")) { const t3=members.slice(0,3);
      return `Dạ, top đội anh/chị: ${t3.map((n,i)=>`${medal(i+1)} ${n.ten} (${n.diem}đ)`).join(" · ")}.`; }
    if (hasW("yeu","kem","thap nhat"))
      return `Dạ, 3 bạn điểm thấp nhất đội cần kèm cặp: ${members.slice(-3).reverse().map(n=>`${n.ten} (${n.diem}đ)`).join(" · ")}. Anh/chị dùng thư viện hành động (tab Tiêu chí) để coaching 1-1 nhé.`;
    if (kCrit && has("lam gi","cai thien","hanh dong","giai phap","cach"))
      return `Dạ, hành động cải thiện ${tenTC(kCrit)}:\n\n${actionText(kCrit)}`;
  }

  // ========== E. KHO ==========
  if (user.type === "kho") {
    const members = nvOfKho(d.kho);
    const t = TN.find(x=>x.kho===d.kho);
    if (has("dung dau","cao nhat","gioi nhat") || hasW("top")) { const top=members[0];
      return `Dạ, đứng đầu kho ${d.tinh} là ${top.ten} (mã ${top.ma}) — ${top.diem}đ${top.vuotTroi?" 🏆":""}. Top 3: ${members.slice(0,3).map((n,i)=>`${medal(i+1)} ${n.ten} (${n.diem}đ)`).join(" · ")}`; }
    if (has("vuot troi","may nguoi","bao nhieu nguoi"))
      return `Dạ, kho ${d.tinh} có ${members.filter(n=>n.vuotTroi).length}/${members.length} người đạt Vượt Trội 🏆:\n${members.filter(n=>n.vuotTroi).map(n=>`• ${n.ten} — ${n.diem}đ`).join("\n")||"(chưa có)"}`;
    if (hasW("yeu","kem"))
      return `Dạ, 3 bạn điểm thấp nhất kho ${d.tinh}: ${members.slice(-3).reverse().map(n=>`${n.ten} (${n.diem}đ)`).join(" · ")}. Trưởng nhóm nên kèm cặp 1-1 theo thư viện hành động ạ.`;
    if (has("truong nhom"))
      return t? `Dạ, trưởng nhóm kho ${d.tinh} là ${t.ten} — ${t.tongDiem}đ, hạng ${t.xepHang} ${t.vung} ${medal(t.xepHang)??""}.`: null;
    if (hasW("hang","xep hang","hang may","thu may")) {
      const all = [...TN].sort((a,b)=>b.tongDiem-a.tongDiem);
      const r = t? all.findIndex(x=>x.ma===t.ma)+1: null;
      return t? `Dạ, kho ${d.tinh} hạng ${t.xepHang}/${TN.filter(x=>x.vung===t.vung).length} trong ${t.vung} (điểm TN ${t.tongDiem}đ), và hạng ${r}/12 nếu so cả 12 kho toàn khu vực.`: null;
    }
  }

  // ========== F. QUẢN LÝ ==========
  if (user.type === "ql") {
    const agg = TINH_LIST.map(tinh=>{ const mem=NV.filter(n=>n.tinh===tinh); const t=TN.find(x=>x.tinh===tinh);
      return {tinh, vt:mem.filter(n=>n.vuotTroi).length, n:mem.length, tn:t,
        avg: Math.round(mem.reduce((s,x)=>s+x.diem,0)/Math.max(1,mem.length)*10)/10}; });
    // F1. So sánh 2 kho
    if (tinhInQ.length>=2 && has("so sanh","so voi","vs","hon")) {
      const rows = tinhInQ.slice(0,2).map(tinh=>agg.find(a=>a.tinh===tinh));
      return `Dạ, so sánh ${rows.map(r=>r.tinh).join(" vs ")}:\n${rows.map(r=>`• ${r.tinh}: TN ${r.tn?.ten} ${r.tn?.tongDiem}đ (hạng ${r.tn?.xepHang} ${r.tn?.vung}) · ${r.n} NV, ${r.vt} VT 🏆, điểm TB ${r.avg}`).join("\n")}`;
    }
    // F2. Hỏi 1 kho cụ thể
    if (tinhInQ.length===1) {
      const r = agg.find(a=>a.tinh===tinhInQ[0]);
      const mem = nvOfKho(r.tn?.kho || NV.find(n=>n.tinh===r.tinh)?.kho);
      return `Dạ, kho ${r.tinh}: TN ${r.tn?.ten} — ${r.tn?.tongDiem}đ, hạng ${r.tn?.xepHang} ${r.tn?.vung} ${medal(r.tn?.xepHang)??""} · ${r.n} NV, ${r.vt} đạt VT 🏆, điểm TB ${r.avg}.\nTop 3: ${mem.slice(0,3).map((n,i)=>`${medal(i+1)} ${n.ten} (${n.diem}đ)`).join(" · ")}\nCần hỗ trợ: ${mem.slice(-2).reverse().map(n=>`${n.ten} (${n.diem}đ)`).join(" · ")}`;
    }
    if (has("tong","toan vung","khu vuc","tong hop")) {
      const vt = NV.filter(n=>n.vuotTroi).length;
      const topTN = [...TN].sort((a,b)=>b.tongDiem-a.tongDiem)[0];
      return `Dạ, tổng khu vực anh quản lý:\n• ${NV.length} NV bảo hành tại nhà — ${vt} đạt Vượt Trội 🏆 (${Math.round(vt/NV.length*100)}%)\n• 13 trưởng nhóm, dẫn đầu: ${topTN.ten} (${topTN.tinh}, ${topTN.tongDiem}đ) 🥇\n• VT theo kho: ${agg.map(a=>`${a.tinh} ${a.vt}/${a.n}`).join(" · ")}`;
    }
    if (has("yeu nhat","kem nhat")) {
      const worst = [...TN].sort((a,b)=>a.tongDiem-b.tongDiem)[0];
      const lows = Object.entries(CRIT_TN).filter(([k])=>!TN_FROM_T7.includes(k)).map(([k,nm])=>({nm, ic:ACTIONS[k]?.icon, f:MONTHS.filter(m=>worst.thang?.[m] && !(worst.thang[m].tc?.[k]?.d>0)).length})).filter(x=>x.f>0).sort((a,b)=>b.f-a.f);
      return `Dạ, kho yếu nhất theo điểm TN: ${worst.tinh} — ${worst.ten}, ${worst.tongDiem}đ (hạng ${worst.xepHang} ${worst.vung}).\nTiêu chí hụt nhiều nhất: ${lows.map(x=>`${x.ic} ${x.nm} (hụt ${x.f} tháng)`).join(" · ")||"—"}.\nAnh nên làm việc riêng với TN kho này trong tuần ạ.`;
    }
    if (has("manh nhat","tot nhat")) {
      const best = [...TN].sort((a,b)=>b.tongDiem-a.tongDiem)[0];
      const a2 = agg.find(a=>a.tinh===best.tinh);
      return `Dạ, kho mạnh nhất: ${best.tinh} — TN ${best.ten} ${best.tongDiem}đ 🥇, ${a2.vt}/${a2.n} NV đạt VT. Anh có thể mời chia sẻ kinh nghiệm trong họp vùng ạ.`;
    }
    if (has("nhieu vuot troi","vt nhat","nhieu nhat")) {
      const best = [...agg].sort((a,b)=>b.vt-a.vt)[0];
      return `Dạ, kho nhiều Vượt Trội nhất: ${best.tinh} — ${best.vt}/${best.n} người 🏆.`;
    }
    if (has("danh sach","ai dat","nhung ai")) {
      const byKho = agg.filter(a=>a.vt>0).map(a=>`• ${a.tinh}: ${NV.filter(n=>n.tinh===a.tinh&&n.vuotTroi).map(n=>n.ten).join(", ")}`);
      return `Dạ, danh sách ${NV.filter(n=>n.vuotTroi).length} NV đạt Vượt Trội 🏆:\n${byKho.join("\n")}`;
    }
    if (has("dan dau") || hasW("hang 1","top"))
      return `Dạ, bảng dẫn đầu:\n• TN: ${["VTB","VDH"].map(v=>{const t=TN.filter(x=>x.vung===v).sort((a,b)=>(a.xepHang??99)-(b.xepHang??99))[0]; return `${v}: ${t.ten} (${t.tinh}, ${t.tongDiem}đ) 🥇`;}).join(" · ")}\n• NV: ${["VTB","VDH"].map(v=>{const n=NV.filter(x=>x.vung===v).sort((a,b)=>b.diem-a.diem)[0]; return `${v}: ${n.ten} (${n.tinh}, ${n.diem}đ)`;}).join(" · ")}`;
  }

  return extraAnswer(q, user); // lớp mở rộng 20 nhóm; vẫn không khớp → null → AI
}

// ===== LỚP TRẢ LỜI MỞ RỘNG (20 nhóm intent — 22/07/2026, test 1308/1308 PASS). Chỉ chạy khi lớp cũ không khớp. =====
function extraAnswer(q, user){
  const d = user.data || {};
  const has = (...ws)=>ws.some(w=>q.includes(w));
  const hasW = (...ws)=>ws.some(w=>new RegExp("(^|[^a-z0-9])"+w.replace(/ /g,"\\s+")+"($|[^a-z0-9])").test(q));
  const money = (v)=> v==null? "—" : (v>=1e6? String(Math.round(v/1e5)/10).replace(".",",")+"tr" : Math.round(v).toLocaleString("vi-VN")+"đ");
  const mAll = [...q.matchAll(/(?:^|[^a-z0-9])(?:thang\s*|t)([1-9])(?![0-9])/g)].map(x=>"T"+x[1]);
  const tinhQ = TINH_LIST.filter(t=>q.includes(norm(t)));
  const maQ = (q.match(/(^|[^0-9])(\d{5,6})($|[^0-9])/)||[])[2];
  const nvMa = maQ? NV.find(n=>n.ma===maQ): null;
  const kcode = (kho)=>{ const m=String(kho||"").match(/(VTB|VDH)_[A-Z]{3}/); return m?m[0]:null; };
  const scOf = (ma,mn)=>{ const r=SC[ma]&&SC[ma][mn]; return r? (r[0]||0):0; };
  const scKho = (kho,mn)=>NV.filter(n=>n.kho===kho).reduce((s,n)=>s+scOf(n.ma,mn),0);
  const vName = (v)=>v==="VTB"?"Vùng Trung Bộ":"Vùng Duyên Hải";
  const diemOf = (p)=>p.diem??p.tongDiem??0;

  // ===== 18. GIẢI THÍCH THUẬT NGỮ =====
  if ((hasW("la gi","la sao","nghia la gi","hieu the nao","co nghia gi") || has("giai thich")) && !has("bi quyet","cach dat","lam sao","the nao de")){
    if (has("tiep can")) return "Dạ, TỶ LỆ TIẾP CẬN = tỷ lệ khách đánh giá thợ trên App sau khi hoàn tất đơn. Tiêu chí NV: tiếp cận ≥ trung bình kho là đạt (2đ/tháng). Cách tăng: cài app Thợ ĐMX cho khách, nhắc khách đánh giá khi hoàn tất ạ.";
    if (has("xldd","xld1l","dut diem")) return "Dạ, XỬ LÝ DỨT ĐIỂM 1 LẦN (XLĐ1L) = đơn bảo hành phải xử lý xong ngay lần đầu; nếu cập nhật \"Chuyển Hãng - Lỗi Sản Phẩm\" mà Hãng kiểm không lỗi là bị tính lỗi. Không lỗi trong tháng = đạt 2đ ạ.";
    if (has("scdv","sua chua dich vu","khach le")) return "Dạ, SCDV (Sửa chữa khách lẻ) = dịch vụ sửa chữa thu phí ngoài bảo hành (thay linh kiện, sửa Board...) — nguồn doanh thu thêm của đội. Với TN là tiêu chí doanh thu theo chỉ tiêu kho ạ.";
    if (has("ban don")) return "Dạ, BÁN ĐƠN SCDV = số đơn sửa chữa khách lẻ hoàn tất trong tháng (mỗi jobcard kết thúc = 1 đơn) ạ.";
    if (has("imei","tay nghe","lap lai")) return "Dạ, TAY NGHỀ CHUẨN (lỗi IMEI lặp lại) = cùng 1 máy (IMEI) không được phát sinh sửa lại cùng lỗi trong 30 ngày. Không có ca lặp lại = đạt ạ.";
    if (has("vuot troi")) return "Dạ, VƯỢT TRỘI = danh hiệu xét theo tổng điểm lũy kế các tiêu chí; NV xét theo kho với quota 30%/kho, bằng điểm xét thêm thu nhập. TN xếp hạng riêng VTB/VDH ạ.";
    if (has("5 sao","nam sao","sao phuc vu")) return "Dạ, PHỤC VỤ 5 SAO = điểm khách chấm thợ (1-5⭐) khi hoàn tất. Điểm kho = trung bình các phiếu; phiếu ≤3⭐ kéo điểm mạnh nên phải chăm sóc từng khách ạ.";
    if (has("dung hen")) return "Dạ, ĐÚNG HẸN = giao/lắp đúng khung giờ đã hẹn với khách. Trễ mà không đổi giờ hợp lệ qua tổng đài là tính đơn trễ; tỷ lệ đúng hẹn kho phải ≥ KPI ạ.";
    if (has("5s") && !has("5 sao")) return "Dạ, THỢ CHUẨN 5S = chuẩn tác phong: đồng phục, giày, dụng cụ, dọn sạch sau bảo hành, thái độ chào hỏi — chấm 10 điểm ạ.";
  }
  // ===== 19. MỐC THỜI GIAN & KỲ ĐÁNH GIÁ =====
  if (has("chot ngay nao","chot khi nao","chot data ngay","ky danh gia nao","ky nao chot")) return "Dạ, kỳ ĐÁNH GIÁ VƯỢT TRỘI này là lũy kế 6 tháng đầu năm 2026, chốt data ngày 16/07/2026. Số Tháng 7 trong app là tạm tính giữa tháng (chốt 14-15/07) ạ.";
  if (has("khi nao") && (hasW("t7","thang 7") || has("thang sau"))) return "Dạ, data Tháng 7 hiện là TẠM TÍNH đến giữa tháng (14-15/07). Số chốt chính thức sẽ cập nhật khi khóa sổ đầu Tháng 8 ạ.";
  if (has("kpi moi","bo kpi moi","tu thang 7 kpi")) return "Dạ, từ T7/2026 áp bộ KPI mới (vd SCDV của TN lên 4đ/tháng). Bộ KPI mới KHÔNG áp vào bảng lũy kế 6 tháng đầu năm — hai kỳ tách riêng ạ.";
  if (has("toi thieu") && has("thang")) return "Dạ, điều kiện xét Vượt Trội: tối thiểu 5 tháng làm việc ở vị trí trong kỳ đánh giá ạ.";
  // ===== 20. ĐỘNG VIÊN & ĐỊNH HƯỚNG =====
  if (has("nan qua","chan qua","met moi","ap luc","muon bo","muon nghi","xuong tinh than","buon qua")) return "Dạ, em hiểu áp lực của nghề mình 🤗. Anh/chị nhớ: mình chọn nghề phục vụ — khách có người khó người dễ, thái độ tốt là chìa khóa. Điểm số từng tháng làm lại được; cứ tập trung từng đơn hàng một. Cần hỗ trợ tay nghề hay đơn khó, báo ngay trưởng nhóm — không ai phải tự xoay một mình ạ. Gõ \"làm sao cải thiện\" để nhận kế hoạch cụ thể!";
  if (has("bi quyet","lam sao gioi","lam sao de gioi","cach dat vuot troi","muon dat vuot troi")) return "Dạ, bí quyết đạt Vượt Trội gói trong 3 việc mỗi ngày: (1) 😊 Không để khách phàn nàn — gọi trước khi đến, minh bạch chi phí; (2) 📲 Nhắc khách đánh giá trên app để tăng tiếp cận; (3) 🎯 Sửa chắc tay, dứt điểm 1 lần. Làm đều 3 việc này, điểm tự tới ạ!";
  if (has("khach kho tinh","khach kho chiu","khach chui","bi khach mang")) return "Dạ, gặp khách khó: giữ bình tĩnh, lắng nghe hết ý trước, xin lỗi vì trải nghiệm chưa tốt (không đôi co), nêu rõ hướng xử lý + thời hạn, và báo trưởng nhóm nếu vượt thẩm quyền. Xử lý than phiền trong 24h là nguyên tắc vàng ạ.";
  // ===== 15. CẢM ƠN / XÃ GIAO =====
  if (has("cam on","thank")) return "Dạ, không có gì ạ! 🙌 Cần tra cứu gì thêm anh/chị cứ gõ, hoặc gõ \"hỏi được gì\" để xem danh mục nhé!";
  if (has("app nay lam duoc gi","app nay la gi","gioi thieu app")) return "Dạ, app ĐÁNH GIÁ VƯỢT TRỘI 2026 giúp tra cứu: điểm & xếp hạng từng NV/TN, kết quả từng tiêu chí theo tháng T1–T7, chi tiết khiếu nại, doanh thu SCDV, và gợi ý hành động cải thiện. Không chứa dữ liệu thu nhập ạ.";
  // ===== 16. NGOÀI PHẠM VI =====
  if (has("thoi tiet","bong da","xo so","gia vang","chung khoan","chinh tri","showbiz","phim","ca si")) return "Dạ, em chỉ chuyên về dữ liệu Đánh giá Vượt Trội của BHSC CE thôi ạ 🙏. Anh/chị hỏi về điểm, xếp hạng, tiêu chí, khiếu nại, SCDV... em trả lời ngay!";
  // ===== 17. SO SÁNH =====
  if ((hasW("vtb")||has("trung bo")) && (hasW("vdh")||has("duyen hai"))){
    const st=(v)=>{ const mem=NV.filter(n=>n.vung===v); const tn=TN.filter(t=>t.vung===v);
      return {n:mem.length, vt:mem.filter(x=>x.vuotTroi).length, avg:Math.round(mem.reduce((s,x)=>s+x.diem,0)/Math.max(1,mem.length)*10)/10, tnTop:tn.sort((a,b)=>(a.xepHang??99)-(b.xepHang??99))[0]};
    }; const a=st("VTB"), b=st("VDH");
    return `Dạ, so sánh 2 vùng:\n• ${vName("VTB")}: ${a.n} NV, ${a.vt} 🏆 VT, điểm TB ${a.avg} — TN dẫn đầu: ${a.tnTop.ten} (${a.tnTop.tongDiem}đ)\n• ${vName("VDH")}: ${b.n} NV, ${b.vt} 🏆 VT, điểm TB ${b.avg} — TN dẫn đầu: ${b.tnTop.ten} (${b.tnTop.tongDiem}đ)\n→ Điểm TB nghiêng về ${a.avg>=b.avg?"VTB":"VDH"}, số Vượt Trội nghiêng về ${a.vt>=b.vt?"VTB":"VDH"} ạ.`;
  }
  if (tinhQ.length>=2){
    const st=(t)=>{ const mem=NV.filter(n=>n.tinh===t); const tn=TN.find(x=>x.tinh===t);
      return {mem, tn, vt:mem.filter(x=>x.vuotTroi).length, avg:Math.round(mem.reduce((s,x)=>s+x.diem,0)/Math.max(1,mem.length)*10)/10};
    }; const [t1,t2]=tinhQ; const a=st(t1), b=st(t2);
    return `Dạ, so sánh kho ${t1} vs ${t2}:\n• ${t1}: TN ${a.tn?a.tn.ten+" "+a.tn.tongDiem+"đ (hạng "+a.tn.xepHang+" "+a.tn.vung+")":"—"} · ${a.mem.length} NV · ${a.vt} 🏆 · điểm TB NV ${a.avg}\n• ${t2}: TN ${b.tn?b.tn.ten+" "+b.tn.tongDiem+"đ (hạng "+b.tn.xepHang+" "+b.tn.vung+")":"—"} · ${b.mem.length} NV · ${b.vt} 🏆 · điểm TB NV ${b.avg}\n→ Theo điểm TN: ${(a.tn?a.tn.tongDiem:0)>=(b.tn?b.tn.tongDiem:0)?t1:t2} đang nhỉnh hơn ạ.`;
  }
  if (nvMa && user.type==="nv" && nvMa.ma!==d.ma && has("so voi","so sanh","hon")){
    const gap=d.diem-nvMa.diem;
    return `Dạ, so sánh: anh/chị ${d.diem}đ (hạng ${d.xepHang}/${nvOfKho(d.kho).length} kho ${d.tinh}) vs ${nvMa.ten} (${nvMa.ma}) ${nvMa.diem}đ (hạng ${nvMa.xepHang} kho ${nvMa.tinh}). ${gap>0?`Anh/chị đang HƠN ${gap}đ 💪`:gap<0?`Anh/chị đang KÉM ${-gap}đ — cố thêm nhé!`:"Hai bên BẰNG điểm nhau!"} ạ.`;
  }
  if (mAll.length>=2 && (user.type==="nv"||user.type==="tn") && d.thang){
    const [m1,m2]=mAll; const g=(m)=>{ const mm=d.thang[m]; return mm? (mm.diem??mm.tong??0): null; };
    const v1=g(m1), v2=g(m2);
    if (v1!=null&&v2!=null) return `Dạ, so sánh của anh/chị: ${m1} được ${v1}đ, ${m2} được ${v2}đ → ${v1===v2?"bằng nhau":(v1>v2?m1:m2)+" tốt hơn ("+Math.abs(v1-v2)+"đ chênh)"} ạ. Hỏi riêng từng tháng (vd "${m2==="T7"?m1:m2} thế nào") để xem chi tiết tiêu chí!`;
  }
  // ===== 13. XU HƯỚNG =====
  if ((user.type==="nv"||user.type==="tn") && d.thang && (has("tien bo","phong do","xu huong","tang hay giam","so voi thang truoc") || (has("cao nhat","thap nhat")&&has("thang")))){
    const pts=MONTHS.map(m=>({m,v:d.thang[m]?(d.thang[m].diem??d.thang[m].tong??0):null})).filter(x=>x.v!=null);
    if (pts.length>=2){
      const hi=pts.reduce((a,b)=>b.v>=a.v?b:a), lo=pts.reduce((a,b)=>b.v<a.v?b:a);
      const last=pts[pts.length-1], prev=pts[pts.length-2], delta=last.v-prev.v;
      return `Dạ, xu hướng điểm của anh/chị: ${pts.map(p=>`${p.m}:${p.v}`).join(" → ")}.\n• Cao nhất ${hi.m} (${hi.v}đ), thấp nhất ${lo.m} (${lo.v}đ).\n• ${last.m} so với ${prev.m}: ${delta>0?"TĂNG "+delta+"đ 📈":delta<0?"GIẢM "+(-delta)+"đ 📉 — xem lại tiêu chí yếu nhé":"đi ngang"} ạ.`;
    }
  }
  // ===== 14. DANH SÁCH & LỌC =====
  if (has("danh sach","liet ke","nhung ai","gom nhung ai") || hasW("top 3","top 5","top 10")){
    if (has("khieu nai")){
      const scope = tinhQ.length? NV.filter(n=>tinhQ.includes(n.tinh)) : user.type==="ql"? NV : NV.filter(n=>n.tinh===d.tinh);
      const ls = scope.filter(n=>KN[n.ma]&&KN[n.ma].length).map(n=>`• ${n.ten} (${n.ma}) — ${KN[n.ma].length} phiếu (${KN[n.ma].map(x=>"T"+x.t).join(", ")})`);
      return ls.length? `Dạ, NV đang có khiếu nại${tinhQ.length?" kho "+tinhQ.join("/"):user.type==="ql"?" toàn khu vực":" kho "+d.tinh}:\n${ls.join("\n")}\nGõ "khiếu nại <mã NV>" để xem chi tiết từng phiếu ạ.` : "Dạ, phạm vi này hiện KHÔNG có NV nào bị khiếu nại 🎉 ạ.";
    }
    if (has("vuot troi")){
      const scope = tinhQ.length? NV.filter(n=>tinhQ.includes(n.tinh)) : user.type==="ql"? NV : NV.filter(n=>n.tinh===d.tinh);
      const ls = scope.filter(n=>n.vuotTroi).sort((a,b)=>b.diem-a.diem).map(n=>`• ${n.ten} (${n.ma}) — ${n.diem}đ, ${n.tinh}`);
      return ls.length? `Dạ, danh sách đạt VƯỢT TRỘI 🏆${tinhQ.length?" kho "+tinhQ.join("/"):user.type==="ql"?" toàn khu vực ("+ls.length+" người)":" kho "+d.tinh}:\n${ls.join("\n")}` : "Dạ, phạm vi này chưa có ai đạt Vượt Trội ạ.";
    }
    const nTop = (q.match(/top\s*(\d+)/)||[])[1]||3;
    const scope = tinhQ.length? NV.filter(n=>tinhQ.includes(n.tinh)) : user.type==="ql"? NV : NV.filter(n=>n.tinh===d.tinh);
    const ls = [...scope].sort((a,b)=>b.diem-a.diem).slice(0,+nTop).map((n,i)=>`${i+1}. ${n.ten} (${n.ma}) — ${n.diem}đ${n.vuotTroi?" 🏆":""}`);
    if (ls.length) return `Dạ, TOP ${nTop}${tinhQ.length?" kho "+tinhQ.join("/"):user.type==="ql"?" toàn khu vực":" kho "+d.tinh}:\n${ls.join("\n")}`;
  }
  if (has("ai co khieu nai","ai bi khieu nai","ai dang khieu nai")){
    const scope = user.type==="ql"? NV : NV.filter(n=>n.tinh===d.tinh);
    const ls = scope.filter(n=>KN[n.ma]&&KN[n.ma].length).map(n=>`• ${n.ten} (${n.ma}) — ${KN[n.ma].length} phiếu`);
    return ls.length? `Dạ:\n${ls.join("\n")}\nGõ "khiếu nại <mã>" xem chi tiết ạ.` : "Dạ, không có NV nào bị khiếu nại trong phạm vi này 🎉 ạ.";
  }
  // ===== 12. THỐNG KÊ KHO / VÙNG =====
  if (has("kho nao") && has("nhieu vuot troi","nhieu vt","vt nhat")){
    const rows = TINH_LIST.map(t=>({t, vt:NV.filter(n=>n.tinh===t&&n.vuotTroi).length})).sort((a,b)=>b.vt-a.vt);
    return `Dạ, kho nhiều Vượt Trội nhất: ${rows[0].t} (${rows[0].vt} 🏆). Top 3: ${rows.slice(0,3).map(r=>`${r.t} ${r.vt}`).join(" · ")} ạ.`;
  }
  if (has("bao nhieu nhan vien","tong so nhan vien","co bao nhieu nv","tong nv")){
    if (user.type==="ql") return `Dạ, toàn khu vực có ${NV.length} NV bảo hành tại nhà (12 kho, 2 vùng), trong đó ${NV.filter(n=>n.vuotTroi).length} đạt Vượt Trội 🏆; và ${TN.length} trưởng nhóm ạ.`;
    const mem=NV.filter(n=>n.tinh===(d.tinh||"")); if (mem.length) return `Dạ, kho ${d.tinh} có ${mem.length} NV bảo hành tại nhà, ${mem.filter(n=>n.vuotTroi).length} đạt Vượt Trội 🏆 ạ.`;
  }
  if (has("diem trung binh","trung binh kho","tb kho")){
    const t = tinhQ[0]||d.tinh;
    if (t){ const mem=NV.filter(n=>n.tinh===t); if (mem.length) return `Dạ, điểm trung bình NV kho ${t}: ${Math.round(mem.reduce((s,x)=>s+x.diem,0)/mem.length*10)/10}đ (${mem.length} NV) ạ.`; }
  }
  // ===== 10. TỔNG QUAN HỒ SƠ =====
  if ((user.type==="nv"||user.type==="tn") && has("tom tat","tong ket","danh gia chung","diem manh","diem yeu","manh yeu")){
    const CR = user.type==="nv"? CRIT_NV: CRIT_TN;
    const ks = Object.keys(CR).sort((a,b)=>(d.diemLK?.[b]??0)-(d.diemLK?.[a]??0));
    const best=ks[0], worst=ks[ks.length-1];
    return `Dạ, tóm tắt của anh/chị: ${diemOf(d)}đ lũy kế, hạng ${d.xepHang??"—"}${user.type==="nv"?"/"+nvOfKho(d.kho).length+" kho "+d.tinh:" "+d.vung}${d.vuotTroi?" — ĐẠT VƯỢT TRỘI 🏆":""}.\n• Mạnh nhất: ${ACTIONS[best]?.icon||""} ${CR[best]} (${d.diemLK?.[best]??0}đ)\n• Cần cải thiện: ${ACTIONS[worst]?.icon||""} ${CR[worst]} (${d.diemLK?.[worst]??0}đ) — gõ "cải thiện ${norm(CR[worst]).split(" ").slice(0,2).join(" ")}" để nhận hành động ạ.`;
  }
  // ===== 5. CHỈ SỐ CHI TIẾT THEO THÁNG =====
  if (user.type==="nv" && has("tiep can") && mAll.length===1){
    const mn=mAll[0]; const v = mn==="T7"? (T7X[d.ma]?T7X[d.ma][0]:null) : (DET[d.ma]&&DET[d.ma][mn]? DET[d.ma][mn][0]: null);
    return v!=null? `Dạ, tỷ lệ tiếp cận ${mn} của anh/chị: ${(v*100).toFixed(1)}%${mn==="T7"?" (tạm tính giữa tháng)":""} ạ.` : `Dạ, ${mn} anh/chị chưa có số tiếp cận trong app ạ.`;
  }
  if ((has("doanh thu")||hasW("scdv")) && !has("cai thien","lam sao")){
    if (user.type==="nv"){
      if (mAll.length===1) return `Dạ, doanh thu SCDV ${mAll[0]} của anh/chị: ${money(scOf(d.ma,mAll[0]))}${mAll[0]==="T7"?" (tạm tính)":""} ạ.`;
      const tot=MONTHS7.reduce((s,m)=>s+scOf(d.ma,m),0);
      return `Dạ, doanh thu SCDV của anh/chị: ${MONTHS7.map(m=>`${m}: ${money(scOf(d.ma,m))}`).join(" · ")} — tổng ${money(tot)} ạ.`;
    }
    if (user.type==="tn"||user.type==="kho"){
      if (mAll.length===1) return `Dạ, doanh thu SCDV kho ${d.tinh} ${mAll[0]}: ${money(scKho(d.kho,mAll[0]))}${mAll[0]==="T7"?" (tạm tính)":""} ạ.`;
      const tot=MONTHS7.reduce((s,m)=>s+scKho(d.kho,m),0);
      return `Dạ, doanh thu SCDV kho ${d.tinh}: ${MONTHS7.map(m=>`${m}: ${money(scKho(d.kho,m))}`).join(" · ")} — tổng ${money(tot)} ạ.`;
    }
    if (user.type==="ql" && tinhQ.length===1){
      const kho=(NV.find(n=>n.tinh===tinhQ[0])||{}).kho;
      if (kho) return `Dạ, doanh thu SCDV kho ${tinhQ[0]}: ${MONTHS7.map(m=>`${m}: ${money(scKho(kho,m))}`).join(" · ")} ạ.`;
    }
  }
  // ===== 7 TIÊU CHÍ TỈNH×THÁNG (bảng vùng mới — KPI/KQ/ĐG/Điểm) =====
  if (tinhQ.length===1 && mAll.length===1 && has("chi tiet","kpi","ket qua","the nao","ra sao","bao nhieu","diem","tieu chi")){
    const t=TN.find(x=>x.tinh===tinhQ[0]);
    if (t){ const mn=mAll[0], v=vMonth(t,mn);
      if (v.hasAny) return `Dạ, ${mn} kho ${tinhQ[0]} — ${v.n}/7 tiêu chí đạt, ${v.ds}đ${mn==="T7"?" (tạm tính 15/07)":""}:\n`+v.rows.map(([k,lb,pt,c])=>`• ${lb}: ${c? `KPI ${c.kpi==null?"—":c.kpi} / KQ ${c.kq==null?"—":c.kq} → ${c.ok?"ĐẠT ✅ +"+c.d+"đ":"CHƯA ĐẠT ❌ 0đ"}`:"— chưa có data"}`).join("\n");
      return `Dạ, ${mn} kho ${tinhQ[0]} chưa có dữ liệu trong app ạ.`; }
  }
  if (tinhQ.length===1 && has("luy ke","tong diem","tong ket","ca ky","7 thang")){
    const t=TN.find(x=>x.tinh===tinhQ[0]);
    if (t){ const v=vTotal(t);
      return `Dạ, TỔNG T1–T7 kho ${tinhQ[0]}: ${v.ds} điểm.\n`+v.per.map(([k,lb,d,p,nm])=>`• ${lb}: ${d}đ — đạt ${p}/${nm} tháng`).join("\n")+`\n(Thợ 5S tạm đạt các tháng; Bán Đơn KPI 20 đơn/tháng, hệ thống chưa mở tạo đơn → chưa đạt.)`; }
  }
  // ===== 11. ĐỘI NHÓM / TRƯỞNG NHÓM =====
  if (has("truong nhom") && tinhQ.length===1 && has("la ai","ai la","ten gi")){
    const t=TN.find(x=>x.tinh===tinhQ[0]);
    return t? `Dạ, trưởng nhóm kho ${tinhQ[0]} là ${t.ten} (${t.ma}) — ${t.tongDiem}đ, hạng ${t.xepHang} ${t.vung} ${medal(t.xepHang)??""} ạ.` : `Dạ, em chưa có thông tin TN kho ${tinhQ[0]} ạ.`;
  }
  if (user.type==="tn" && has("doi toi","doi cua toi","nhom toi","doi minh") ){
    const mem=nvOfKho(d.kho);
    return `Dạ, đội kho ${d.tinh}: ${mem.length} NV, ${mem.filter(n=>n.vuotTroi).length} 🏆 Vượt Trội. Cao nhất: ${mem[0]?.ten} (${mem[0]?.diem}đ); cần kèm cặp: ${mem[mem.length-1]?.ten} (${mem[mem.length-1]?.diem}đ). Gõ "ai có khiếu nại" hoặc "top 3" để xem thêm ạ.`;
  }
  // ===== T7 TÌNH HÌNH (TN/QL) =====
  if (hasW("t7","thang 7") && (user.type==="tn"||user.type==="ql") && has("the nao","ra sao","ket qua","tinh hinh")){
    const src = user.type==="ql"? TN7V : TN7[kcode(d.kho)];
    if (src){
      const line = Object.keys(CRIT_TN).map(k=>`${ACTIONS[k]?.icon||""} ${CRIT_TN[k]}: KQ ${src[k].kq}/KPI ${src[k].kpi} ${src[k].ok?"✅":"❌"}`).join("\n• ");
      return `Dạ, Tháng 7 (tạm tính, chốt 15/07)${user.type==="ql"?" TOÀN VÙNG":" kho "+d.tinh}:\n• ${line}\nSố chốt chính thức cập nhật đầu Tháng 8 ạ.`;
    }
  }
  return null;
}

const S = { tab:"tra", user:null, seg:"TN", msgs:[], err:"" };
const $ = (sel)=>document.querySelector(sel);
const esc = (s)=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const ini = (name)=>(name||"?").trim().split(/\s+/).slice(-2).map(w=>w[0]).join("").toUpperCase();
const av = (name,hl,sz=34)=>`<span class="av ${hl?"av-y":""}" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px">${esc(ini(name))}</span>`;

function svgTrend(p, field){
  const pts = MONTHS.map((m,i)=>({m,i,v:p.thang&&p.thang[m]? (p.thang[m][field]??0):null})).filter(x=>x.v!=null);
  if(!pts.length) return "";
  const W=320,H=96,P=18, xs=(i)=>P+ i*( (W-2*P)/(MONTHS.length-1) );
  const max=Math.max(...pts.map(x=>x.v),1);
  const ys=(v)=>H-14-(v/max)*(H-30);
  const line=pts.map(x=>`${xs(x.i)},${ys(x.v)}`).join(" ");
  return `<div class="trend"><div class="mini-title">📈 TIẾN ĐỘ ĐIỂM THEO THÁNG — so với chính mình</div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:480px">
    <polyline points="${line}" fill="none" stroke="${C.blue}" stroke-width="2.5"/>
    ${pts.map(x=>`<circle cx="${xs(x.i)}" cy="${ys(x.v)}" r="4" fill="${C.yellow}" stroke="${C.navy}" stroke-width="1.5"><title>${x.m}: ${x.v} điểm</title></circle>`).join("")}
    ${pts.map(x=>`<text x="${xs(x.i)}" y="${H-2}" font-size="9" fill="${C.sub}" text-anchor="middle">${x.m}</text>`).join("")}
    ${pts.map(x=>`<text x="${xs(x.i)}" y="${ys(x.v)-7}" font-size="8.5" font-weight="700" fill="${C.navy}" text-anchor="middle">${x.v}</text>`).join("")}
  </svg></div>`;
}

function monthGrid(p, keys, names, forcePass, forceFail){
  forcePass = forcePass||[]; forceFail = forceFail||[];
  const rows = keys.map(ck=>{
    const forced = forcePass.includes(ck); const ffail = forceFail.includes(ck);
    const cells = MONTHS.map(m=>{
      const mm=p.thang&&p.thang[m]; const d=mm&&mm.tc&&mm.tc[ck]? mm.tc[ck].d: undefined;
      const has=mm!==undefined; let ok=d>0; if(forced&&has) ok=true; if(ffail&&has) ok=false;
      return `<td class="${!has?"c-n":ok?"c-p":"c-f"}" title="${has?(forced?"Tạm đạt (chờ KPI)":ffail?"Chưa đạt (chưa có KPI)":("Điểm: "+(d??0))):"Chưa có data"}">${!has?"·":ok?"✓":"✗"}</td>`;
    }).join("");
    const f=MONTHS.filter(m=>p.thang&&p.thang[m]).length, pass=forced?f:ffail?0:monthsPass(p,ck).length;
    return `<tr><td class="c-name">${esc(names[ck])}</td>${cells}<td class="c-sum ${pass===f&&f>0?"ok":""}">${pass}/${f}</td></tr>`;
  }).join("");
  return `<div class="mgwrap"><table class="mg"><thead><tr><th style="text-align:left">TIÊU CHÍ</th>${MONTHS.map(m=>`<th>${m}</th>`).join("")}<th>ĐẠT</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="legend">✓ tháng đạt (có điểm) · ✗ tháng không đạt / không đi làm · Bấm giữ ô để xem điểm. <i>Thợ Chuẩn 5S: đạt tạm · Bán Đơn SCDV: để chưa đạt (chờ KPI). Cập nhật khi anh Thu đưa KPI.</i></div></div>`;
}

const BANDON_KPI=20;
function vCell(t,m,k,pt){
  const hasM = m==="T7"? !!tn7Of(t) : !!(t&&t.thang&&t.thang[m]);
  if(k==="tho5s"){ if(!hasM) return null; return m==="T7"? {kpi:10,kq:10,ok:true,d:2} : {kpi:null,kq:"Đạt chuẩn",ok:true,d:2}; }

  const tc=t&&t.thang&&t.thang[m]&&t.thang[m].tc? t.thang[m].tc[k]:null;
  if(!tc) return null; return {kpi:tc.kpi??null,kq:tc.kq??null,ok:tc.d>0,d:tc.d>0?(tc.d||pt):0};

function regionCrit(m,k){
  const ts = TINH_LIST.map(t=>TN.find(x=>x.tinh===t)).filter(Boolean);
  const cells = ts.map(t=>(t.thang&&t.thang[m]&&t.thang[m].tc)?t.thang[m].tc[k]:null).filter(x=>x!=null);
  if(k==="5sao"){ const kqs=cells.filter(c=>c.kq!=null).map(c=>c.kq), kpis=cells.filter(c=>c.kpi!=null).map(c=>c.kpi);
    if(kqs.length&&kpis.length){ const kq=avgArr(kqs), kpi=avgArr(kpis); return {ok:kq>=kpi,kq,kpi,tam:false}; } }
  if(k==="scdv"){ const kq=cells.reduce((s,c)=>s+(c.kq||0),0), kpi=cells.reduce((s,c)=>s+(c.kpi||0),0);
    if(kpi>0) return {ok:kq>=kpi,kq,kpi,tam:false}; }
  return {ok:true, tam:true}; // chưa có KPI vùng → đạt tạm
}

      <button class="rowi ${i%2?"":"alt"}" data-action="open-tn" data-ma="${t.ma}"><span class="rk">${medal(t.xepHang)??"#"+t.xepHang}</span>${av(t.ten,t.xepHang<=3,32)}
      <span class="nm">${esc(t.ten)} <small>· ${esc(t.tinh)}</small></span><span class="pt">${t.tongDiem}</span></button>`).join("")}</div>`).join("");
  if(S.seg==="NV") body = ["VTB","VDH"].map(v=>{
    const list=NV.filter(n=>n.vung===v).sort((a,b)=>b.diem-a.diem).slice(0,10);
    return `<div class="stitle">TOP 10 NHÂN VIÊN ${v==="VTB"?"TRUNG BỘ":"DUYÊN HẢI"}</div>
    <div class="list">${list.map((n,i)=>`<button class="rowi ${i%2?"":"alt"}" data-action="open-nv" data-ma="${n.ma}"><span class="rk">${medal(i+1)??"#"+(i+1)}</span>${av(n.ten,n.vuotTroi,32)}
      <span class="nm">${esc(n.ten)} <small>· ${esc(n.tinh)}</small></span><span class="pt">${n.diem}</span>${n.vuotTroi?"🏆":""}</button>`).join("")}</div>`;}).join("");
  if(S.seg==="KHO") body = regionTable();
  return `<div class="card p"><div class="chips" style="margin-bottom:12px">${segs.map(([k,l])=>`<button class="seg ${S.seg===k?"on":""}" data-action="seg" data-seg="${k}">${l}</button>`).join("")}</div>${body}</div>`;
}

function rulesHTML(){
  return `<div class="card p"><div class="stitle">TIÊU CHÍ XÉT VƯỢT TRỘI (KPI chốt 16/07/2026)</div>
  <pre class="rules">${esc(KPI_RULES)}</pre></div>
  <div class="card p"><div class="stitle">THƯ VIỆN HÀNH ĐỘNG CẢI THIỆN</div>
  ${Object.values(ACTIONS).map(a=>`<div class="act"><div class="act-t">${a.icon} ${esc(a.ten)}</div>
    ${a.moto?`<div class="act-m">💡 ${esc(a.moto)}</div>`:""}${a.items.map(x=>`<div class="act-i">${esc(x)}</div>`).join("")}</div>`).join("")}</div>`;
}

function homeHTML(){
  return `<div class="card p">
    <h2 style="font-size:16.5px">Tra cứu kết quả của bạn</h2>
    <p class="hint">Nhập mã nhân viên, tên, hoặc tên tỉnh — ${TN.length} trưởng nhóm · ${NV.length} NV bảo hành tại nhà · 12 kho tỉnh.</p>
    <div class="srow"><input id="inp" placeholder="VD: mã NV, tên, Quảng Nam…" value="${esc(S.q||"")}"><button class="btn-y" data-action="login">Xem</button></div>
    ${S.err?`<p class="err">${esc(S.err)}</p>`:""}
    <div class="chips" style="margin-top:12px">Thử nhanh: ${["Quảng Nam","Khánh Hòa","Bình Định"].map(s=>`<button class="chip" data-action="fill" data-q="${s}">${s}</button>`).join("")}</div>
    ${statCards([[NV.filter(n=>n.vuotTroi).length+"/"+NV.length,"NV đạt Vượt Trội 🏆"],[String(TN.length),"Trưởng nhóm"],["12","Kho tỉnh"],["2","Vùng VTB · VDH"]])}
  </div>`;
}

function login(val){
  const raw=(val??($("#inp")?$("#inp").value:"")).trim(); const q=norm(raw); if(!q) return;
  S.msgs=[]; S.err="";
  if(raw===MANAGER.ma || q.includes("duy thu")){ S.user={type:"ql",data:MANAGER}; render(); return; }
  const n=NV.find(x=>x.ma===raw)||NV.find(x=>norm(x.ten).includes(q));
  const t=TN.find(x=>x.ma===raw)||TN.find(x=>norm(x.ten).includes(q));
  if(n&&(!t||n.ma===raw)){ S.user={type:"nv",data:n}; render(); return; }
  if(t){ S.user={type:"tn",data:t}; render(); return; }
  if(n){ S.user={type:"nv",data:n}; render(); return; }
  const kh=NV.find(x=>norm(x.tinh||"").includes(q)||norm(x.kho||"")===q);
  if(kh){ S.user={type:"kho",data:{kho:kh.kho,tinh:kh.tinh,vung:kh.vung}}; render(); return; }
  S.q=raw; S.err="Không tìm thấy. Thử mã NV, tên, hoặc tên tỉnh (vd: Quảng Nam, Khánh Hòa)."; render();
}

function render(){
  const tabs=[["tra","🔍 Tra cứu"],["bxh","🏆 Xếp hạng"],["vung","📊 Toàn vùng"],["tc","📘 Tiêu chí"]];
  let main="";
  if(S.tab==="tra") main = S.user? profileHTML(): homeHTML();
  if(S.tab==="bxh") main = leaderboardHTML();
  if(S.tab==="vung") main = managerHTML();
  if(S.tab==="tc") main = rulesHTML();
  $("#app").innerHTML = `<header><div class="hwrap">
    <div class="hbadges"><span class="tag">BHSC CE</span><span class="hsub">VÙNG TRUNG BỘ + DUYÊN HẢI · 12 TỈNH</span></div>
    <h1>🏆 ĐÁNH GIÁ VƯỢT TRỘI 2026</h1><div class="hsub2">Lũy kế 6 tháng đầu năm · cập nhật 16/07/2026</div>
    <nav>${tabs.map(([k,l])=>`<button class="tabb ${S.tab===k?"on":""}" data-action="tab" data-tab="${k}">${l}</button>`).join("")}</nav>
  </div></header><main>${main}</main>`;
  const cb=$("#chatb"); if(cb) cb.scrollTop=cb.scrollHeight;
}

document.addEventListener("click",(e)=>{
  const b=e.target.closest("[data-action]"); if(!b) return;
  const a=b.dataset.action;
  if(a==="tab"){ S.tab=b.dataset.tab; if(S.tab!=="tra") S.user=null; S.err=""; render(); }
  if(a==="login") login();
  if(a==="fill"){ S.q=b.dataset.q; render(); $("#inp").focus(); }
  if(a==="back"){ S.user=null; S.q=""; S.msgs=[]; render(); }
  if(a==="seg"){ S.seg=b.dataset.seg; render(); }
  if(a==="open-nv"){ const n=NV.find(x=>x.ma===b.dataset.ma); if(n){S.user={type:"nv",data:n}; S.tab="tra"; S.msgs=[]; render(); window.scrollTo(0,0);} }
  if(a==="open-tn"){ const t=TN.find(x=>x.ma===b.dataset.ma); if(t){S.user={type:"tn",data:t}; S.tab="tra"; S.msgs=[]; render(); window.scrollTo(0,0);} }
  if(a==="open-kho"){ const kh=b.dataset.kho; const m=NV.find(x=>x.kho===kh); if(m){S.user={type:"kho",data:{kho:m.kho,tinh:m.tinh,vung:m.vung}}; S.tab="tra"; S.msgs=[]; render(); window.scrollTo(0,0);} }
  if(a==="exp-cell"){ const t=b.dataset.tinh, m=b.dataset.m;
    S.expV = (S.expV && S.expV.tinh===t && S.expV.m===m)? null : {tinh:t, m};
    const y=window.scrollY; render(); window.scrollTo(0,y); }
  if(a==="ask") ask(b.dataset.q);
  if(a==="send"){ const v=$("#chatinp").value.trim(); if(v){ $("#chatinp").value=""; ask(v);} }
});
document.addEventListener("keydown",(e)=>{
  if(e.key!=="Enter") return;
  if(e.target.id==="inp") login();
  if(e.target.id==="chatinp"){ const v=e.target.value.trim(); if(v){ e.target.value=""; ask(v);} }
});
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
render();

</script>
</body>
</html>
